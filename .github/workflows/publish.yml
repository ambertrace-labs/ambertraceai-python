name: Publish to PyPI

# Publishes the public ambertraceai SDK to PyPI on a version tag (v*).
# Authentication is OIDC "trusted publishing" — this repo
# (Pilot-Generative-AI/ambertraceai-python) is registered as the trusted
# publisher for the `ambertraceai` PyPI project against this workflow file, so
# no API token is needed. The package ships the pre-generated client (synced
# from the private AmbertraceAI source repo), so there's no codegen step here —
# just build the committed package and publish.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi   # must match the PyPI trusted publisher's configured
                        # environment (else OIDC claim is environment:MISSING
                        # and PyPI rejects with invalid-publisher)
    permissions:
      id-token: write   # OIDC trusted publishing
      contents: write   # actions/checkout + create the GitHub Release for the tag
                        # (a permissions block defaults the rest to `none`)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      # Keep the GitHub "Releases" shop window in lock-step with PyPI: every
      # published version tag gets a GitHub Release with auto-generated notes
      # (from the commits since the previous tag) + the built sdist/wheel
      # attached. Runs only after a successful publish.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

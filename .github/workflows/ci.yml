name: CI

# This workflow only runs the test suite for the public mirror — it does NOT
# publish. PyPI publishing lives in `publish.yml` (triggered by a `v*` tag),
# because this repo — not the private source repo — is the registered PyPI
# trusted publisher for the `ambertraceai` project. The SDK itself is generated
# in the private AmbertraceAI source repo and synced here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
